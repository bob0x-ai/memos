name: memos-test
version: 2.0.0

ontology:
  entity_types:
    - Person
    - System
    - Project
    - Error
    - Document
    - Organization

  content_types:
    - fact
    - decision
    - preference
    - learning
    - summary
    - sop
    - warning
    - contact

  access_levels:
    - public
    - restricted
    - confidential

departments:
  test-ops: {}
  test-devops: {}

roles:
  worker:
    access_level: restricted
    capture:
      enabled: true
    recall:
      content_types: [fact, learning, warning, sop]
      max_results: 5
      reranker: rrf
      min_importance: 1
      department_scope: own

  management:
    access_level: confidential
    capture:
      enabled: true
    recall:
      content_types: [summary]
      max_results: 3
      reranker: cross_encoder
      min_importance: 1
      department_scope: all

  contractor:
    access_level: public
    capture:
      enabled: false
    recall:
      content_types: [summary, fact]
      max_results: 2
      reranker: rrf
      min_importance: 1
      department_scope: all

agents:
  test-main:
    role: management
    department: test-ops

  test-mother:
    role: worker
    department: test-ops

  test-kernel:
    role: worker
    department: test-devops

  test-nyx:
    role: worker
    department: test-devops

unknown_agent_policy:
  role: contractor
  department: null

overrides:
  agents: {}

summarization:
  enabled: false
  cache_ttl_hours: 1
  levels: []

llm:
  model: gpt-4o-mini
  temperature: 0.1
  max_tokens: 100
