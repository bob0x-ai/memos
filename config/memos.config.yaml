name: memos
version: 2.0.0

ontology:
  entity_types:
    - Person
    - System
    - Project
    - Error
    - Document
    - Organization

  content_types:
    - fact
    - decision
    - preference
    - learning
    - summary
    - sop
    - warning
    - contact

  access_levels:
    - public
    - restricted
    - confidential

departments:
  ops: {}
  devops: {}

roles:
  worker:
    access_level: restricted
    capture:
      enabled: true
    recall:
      content_types: [fact, learning, warning, sop]
      max_results: 10
      reranker: rrf
      min_importance: 2
      department_scope: own

  management:
    access_level: confidential
    capture:
      enabled: true
    recall:
      content_types: [summary]
      max_results: 5
      reranker: cross_encoder
      min_importance: 3
      department_scope: all

  contractor:
    access_level: public
    capture:
      enabled: false
    recall:
      content_types: [summary, fact]
      max_results: 3
      reranker: rrf
      min_importance: 3
      department_scope: all

agents:
  main:
    role: management
    department: ops

  mother:
    role: worker
    department: ops

  masa:
    role: worker
    department: ops

  scout:
    role: worker
    department: ops

  kernel:
    role: worker
    department: devops

  nyx:
    role: worker
    department: devops

  warden:
    role: worker
    department: devops

unknown_agent_policy:
  role: contractor
  department: null

overrides:
  agents: {}

summarization:
  enabled: true
  cache_ttl_hours: 4
  levels:
    - level: 0
      target: workers
      max_entities: 20
    - level: 1
      target: team_leads
      max_entities: 50
    - level: 2
      target: management
      max_entities: 100

llm:
  model: gpt-4o-mini
  temperature: 0.3
  max_tokens: 500
