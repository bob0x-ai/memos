name: memos
version: 2.0.0

ontology:
  entity_types:
    - Person
    - Preference
    - Requirement
    - Procedure
    - Location
    - Event
    - Organization
    - Service
    - Project
    - Issue
    - Decision
    - Document
    - Topic
    - Object

departments:
  ops: {}
  devops: {}
  company: {}

roles:
  worker:
    access_level: restricted
    capture:
      enabled: true
      # private -> agent_id, department -> agent.department, company -> shared company group
      scope: department
    recall:
      # mode=facts injects concrete recalled facts; mode=summary injects an executive summary
      mode: facts
      # self = own private agent_id group
      # department = own department group
      # company = shared company-wide group
      # all_departments = all configured department groups, never other agents' private groups
      scopes: [department, company]
      max_results: 10
      min_importance: 2

  management:
    access_level: confidential
    capture:
      enabled: true
      # Management defaults to private auto-capture to avoid noisy shared injection by default.
      scope: private
    recall:
      mode: summary
      # Add all_departments only for executives who should see cross-department auto-recall.
      scopes: [self, department, company]
      max_results: 5
      min_importance: 3

  contractor:
    access_level: public
    capture:
      enabled: false
      scope: company
    recall:
      mode: facts
      scopes: [company]
      max_results: 3
      min_importance: 3

agents:
  main:
    role: management
    department: ops

  mother:
    role: worker
    department: ops

  masa:
    role: worker
    department: ops

  scout:
    role: worker
    department: ops

  kernel:
    role: worker
    department: devops

  nyx:
    role: worker
    department: devops

  warden:
    role: worker
    department: devops

unknown_agent_policy:
  role: contractor
  department: null

overrides:
  agents: {}

summarization:
  enabled: true
  cache_ttl_hours: 1
  levels:
    - level: 0
      target: workers
      max_entities: 20
    - level: 1
      target: team_leads
      max_entities: 50
    - level: 2
      target: management
      max_entities: 100

llm:
  model: gpt-4o-mini
  temperature: 0.3
  max_tokens: 1000
  prompts:
    summarization_system: 'You summarize memory facts for executives. Return concise markdown/plain text only, ready to inject directly into chat context. Structure the output with short topic sections using headings like "Topic: <name>" followed by 1-3 concise bullet points. Do not return JSON. Do not include startup/session/bootstrap chatter, self-referential memory-system meta commentary, duplicate points, or source fact IDs. Prefer concrete project/workstream facts over generic statements. If nothing relevant remains, say "No relevant memory signals were found for this query."'
